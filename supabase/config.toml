# Supabase Local Development Configuration
# This file is used when running Supabase locally

project_id = "svkbzhlrjujeteqjrckv"

[api]
port = 54321
schemas = ["public"]
extra_search_path = ["public"]
max_rows = 1000

[db]
port = 54322
major_version = 17

[db.seed]
enabled = true
sql_paths = ["./seed-local-cfp.sql"]

[studio]
port = 54323

[auth]
site_url = "http://localhost:3000"
additional_redirect_urls = [
  "http://localhost:3000/cfp/auth/callback",
  "http://localhost:3000/cfp/reviewer/auth/callback",
  "http://localhost:*/**",
  "http://127.0.0.1:*/**"
]
jwt_expiry = 3600
enable_signup = true

[auth.email]
enable_signup = true
double_confirm_changes = true
enable_confirmations = false
